<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>🎂 Mio Birthday Run</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0512;
        touch-action: none;
      }
      canvas {
        position: fixed;
        top: 0;
        left: 0;
        display: block;
        width: 100%;
        height: 100%;
      }
      #birthdayVideo {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        transform: translate(-50%, -50%);
        object-fit: contain;
        opacity: 0;
        pointer-events: none;
        transition: opacity 1.5s ease;
        z-index: 15;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <video id="birthdayVideo" playsinline webkit-playsinline preload="auto">
      <source src="Video.mp4" type="video/mp4" />
    </video>

    <script src="sounds.js"></script>
    <script src="script.js"></script>
  </body>
</html>
